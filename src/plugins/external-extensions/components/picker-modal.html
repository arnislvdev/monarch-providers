<div id="ext-picker-overlay" class="ext-overlay-enter" style="position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;">

    <div class="ext-modal-enter" style="background:var(--background,#13161c);border-radius:14px;border:0.5px solid rgba(255,255,255,.07);width:600px;max-width:100%;height:86vh;max-height:700px;display:flex;flex-direction:column;overflow:hidden;">

        <!-- header -->
        <div style="display:flex;align-items:center;gap:12px;padding:18px 18px 14px;flex-shrink:0;border-bottom:0.5px solid rgba(255,255,255,.06);position:relative;">

            <div style="width:40px;height:40px;border-radius:9px;background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.09);flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(140,165,255,.65)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            </div>

            <div style="flex:1;min-width:0;">
                <p style="margin:0;font-size:15px;font-weight:600;">Browse extensions</p>
                <p style="margin:2px 0 0;font-size:12px;opacity:.38;">Select extensions to install from the manifest</p>
            </div>

            <button class="ext-btn-ghost ext-modal-close" style="position:absolute;right:14px;top:14px;width:28px;height:28px;border-radius:50%;border:0.5px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:inherit;opacity:.4;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/>
                </svg>
            </button>

        </div>

        <!-- search -->
        <div style="padding:12px 18px 0;flex-shrink:0;">
            <input
                class="ext-picker-search"
                type="text"
                placeholder="Search by name, language or package ID..."
                style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 12px;font-size:13px;color:inherit;outline:none;"
            />
        </div>

        <!-- status bar -->
        <div class="ext-picker-statusbar" style="padding:8px 18px 6px;font-size:12px;opacity:.35;flex-shrink:0;display:flex;align-items:center;gap:8px;">
            <span class="ext-picker-status-text">Loading...</span>
            <div class="ext-spinner"></div>
        </div>

        <!-- scrollable list -->
        <div class="ext-list-wrap" style="flex:1;min-height:0;overflow-y:auto;padding:0 18px 8px;display:flex;flex-direction:column;gap:3px;">
            <!-- rows injected by app.js -->
        </div>

        <!-- footer -->
        <div style="padding:12px 18px;border-top:0.5px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px;">
            <span class="ext-picker-count" style="font-size:12px;opacity:.38;">0 selected</span>
            <div style="display:flex;gap:8px;">
                <button class="ext-btn-ghost ext-picker-cancel" style="background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 14px;font-size:13px;color:inherit;cursor:pointer;opacity:.6;">
                    Cancel
                </button>
                <button class="ext-picker-install" style="background:rgba(99,130,255,.15);border:0.5px solid rgba(99,130,255,.3);border-radius:8px;padding:7px 18px;font-size:13px;font-weight:600;color:rgba(140,165,255,.95);cursor:pointer;opacity:.35;pointer-events:none;transition:opacity .15s;">
                    Install selected
                </button>
            </div>
        </div>

    </div>
</div>
