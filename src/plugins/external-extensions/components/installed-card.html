<div class="ext-installed-card" style="position:relative;background:rgba(255,255,255,.03);border-radius:12px;padding:14px;border:0.5px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:10px;">

    <div class="ext-card-top" style="display:flex;gap:10px;align-items:flex-start;">

        <div class="ext-card-icon" style="width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.06);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:0.5px solid rgba(255,255,255,.08);">
            <!-- filled by app.js: either <img> or fallback svg -->
        </div>

        <div class="ext-card-info" style="min-width:0;flex:1;">
            <p class="ext-card-name" style="margin:0;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></p>
            <p class="ext-card-pkg"  style="margin:3px 0 0;font-size:11px;opacity:.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></p>
        </div>

    </div>

    <div class="ext-card-badges" style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;">
        <!-- badges injected by app.js -->
    </div>

    <button class="ext-btn-ghost ext-card-remove" style="margin-top:auto;width:100%;background:rgba(200,50,50,.06);border:0.5px solid rgba(200,50,50,.2);border-radius:8px;padding:7px;font-size:12px;font-weight:600;color:rgba(220,100,100,.7);cursor:pointer;">
        Remove
    </button>

</div>
